steps:
# Step 1: Build the Python package
- name: 'python:3.10'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    python setup.py sdist --formats=gztar

# Step 2: Upload the package to Cloud Storage
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['cp', 'dist/crop_model_trainer-0.1.tar.gz', 'gs://gcp_mlops/trainer/']

# Step 3: Trigger the Vertex AI Custom Job
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    gcloud ai custom-jobs create \
      --region=us-central1 \
      --display-name=crop-lstm-training \
      --python-package-uris=gs://gcp_mlops/trainer/crop_model_trainer-0.1.tar.gz \
      --worker-pool-spec=machine-type=n1-standard-4,executor-image-uri=us-docker.pkg.dev/vertex-ai/training/tf-cpu.2-12.py310:latest,python-module=trainer.train